name: Aviation BI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Generate test dataset
        run: python backend/generate_data.py

      - name: Run pytest with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term-missing
        env:
          ANTHROPIC_API_KEY: ""

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/ --select=E,F --ignore=E501,F401

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t avbi-backend .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t avbi-frontend .
