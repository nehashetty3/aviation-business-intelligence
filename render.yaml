services:
  - type: web
    name: aviation-api
    env: docker
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false # You will paste your API key in the Render dashboard during setup

  - type: web
    name: aviation-ui
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: aviation-api
          envVarKey: RENDER_EXTERNAL_URL
